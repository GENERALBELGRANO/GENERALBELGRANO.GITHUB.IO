<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Belgrano| Tu lugar</title>
    <link rel="stylesheet" href="/paginas/stylenovedades.css">
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="content">
      <div class="logo"><a href="/index.html">General Belgrano</a></div>
      <ul class="menu-list">
        <div class="icon cancel-btn">
          <i class="fas fa-times"></i>
        </div>
        <li><a href="/Paginas/inicio.html">Inicio</a></li>
        <li><a href="/Paginas/novedades.html">Novedades</a></li>
        <li><a href="/Paginas/quevisitar.html">Que visitar</a></li>
        <li><a href="/Paginas/dondealojarse.html">Donde alojarse</a></li>
        <li><a href="/Paginas/dondecomer.html">Donde comer</a></li>
      </ul>
      <div class="icon menu-btn">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>
  <main>

  <div class="banner"></div>
  <div class="about">
<div class="content">
      <div class="title">Novedades</div>
    <img src="/Paginas/banner/novedades1.jpg" alt="" style="width:700px;height:500px;">
    <img src="/Paginas/banner/novedades2.jpg" alt="" style="width:700px;height:500px;">
    </div>
  </div>

  <script>
    const body = document.querySelector("body");
    const navbar = document.querySelector(".navbar");
    const menu = document.querySelector(".menu-list");
    const menuBtn = document.querySelector(".menu-btn");
    const cancelBtn = document.querySelector(".cancel-btn");
    menuBtn.onclick = ()=>{
      menu.classList.add("active");
      menuBtn.classList.add("hide");
      cancelBtn.classList.add("show");
      body.classList.add("disabledScroll");
    }
    cancelBtn.onclick = ()=>{
      menu.classList.remove("active");
      menuBtn.classList.remove("hide");
      cancelBtn.classList.remove("show");
      body.classList.remove("disabledScroll");
    }

    window.onscroll = ()=>{
      this.scrollY > 20 ? navbar.classList.add("sticky") : navbar.classList.remove("sticky");
    }
  </script>

</body>
</html>
